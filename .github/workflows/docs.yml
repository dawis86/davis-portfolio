name: Generate Documentation
on:
  push:
    branches: [ main ]

permissions:
  contents: write # Atļauj botam veikt izmaiņas repozitorijā (Allows bot to push changes)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20' # Atjaunināts uz jaunāko LTS versiju (Updated to latest LTS)
      - run: npm install
      - run: npm run generate-docs
      - name: Commit files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/
          git commit -m "Auto-generate documentation" || echo "No changes to commit"
          git push