<!DOCTYPE html>
<!--
  File: index.html
  Purpose: Primary landing page with dynamic Hero section and Typewriter roles.
  (Mērķis: Primārā mērķlapa ar dinamisku Hero sekciju un rakstāmmašīnas lomām.)
  Author: Dāvis Strazds
  Dependencies: global_style.css, main.js, translations.js
  Architecture: Layered visual stack combining video backgrounds with radial overlays for depth.
  (Arhitektūra: Slāņots vizuālais steks, apvienojot video fonus ar radiāliem pārklājumiem dziļumam.)
-->
<html lang="lv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dāvis Strazds | AI Systems Architect - Galvenā</title>
  
  <!-- 1. Resource Prioritization (Resursu prioritāšu noteikšana) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
  <!-- Preload critical fonts for LCP (Iepriekš ielādēt kritiskos fontus) -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Space+Grotesk:wght@400;700;900&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Space+Grotesk:wght@400;700;900&display=swap" media="print" onload="this.media='all'">
  
  <!-- Deferred Non-critical CSS (Atlikts nekritiskais CSS) -->
  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <link rel="preload" href="https://unpkg.com/aos@2.3.1/dist/aos.css" as="style" onload="this.onload=null;this.rel='stylesheet'">

  <meta name="description" content="Inovatīva AI aģentu vadība, sistēmu arhitektūra un nākotnes programmēšana. Dāvis Strazds - arhitekts, kurš būvē nākotni.">
  
  <!-- SEO: JSON-LD Structured Data (SEO: JSON-LD strukturētie dati) -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Dāvis Strazds | Systems Architect",
      "url": "https://dawis86.github.io/davis-portfolio/",
      "logo": "https://dawis86.github.io/davis-portfolio/images/logo.webp",
      "description": "Advanced AI systems architecture and enterprise data integration.",
      "address": { "@type": "PostalAddress", "addressCountry": "LV" }
    }
  </script>

  <meta property="og:title" content="Dāvis Strazds | AI Systems Architect">
  <meta property="og:description" content="Sistēmu arhitektūra un MI aģentu vadība.">
  <meta property="og:image" content="images/baners.webp">
  <meta property="og:url" content="https://dawis86.github.io/davis-portfolio/">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" type="image/webp" href="images/logo.webp">
  <link rel="stylesheet" href="css/global_style.css">
  <style>
    body {
      min-height: 100vh;
    }

    /* Ambient Video Background (Video fons) */
    .video-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      filter: brightness(0.6) contrast(1.2);
    }

    .video-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, rgba(0,0,0,0.1) 0%, #000000 90%);
      z-index: -1;
    }

    /* Central Hero Content (Centrālais hero saturs) */
    .hero-container {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      z-index: 1;
      padding: 0 var(--fluid-padding);
      max-width: var(--container-max-width);
      margin: 0 auto;
    }

    .hero-pretitle {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(0.9rem, 2vw, 1.4rem);
      color: #00c6ff;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 1rem;
      opacity: 0.8;
    }

    .hero-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2.2rem, 8vw, 8rem); /* Reduced minimum to fit mobile screens (Samazināts minimums) */
      font-weight: 900;
      line-height: 0.95;
      margin: 0 0 1.5rem 0;
      background: linear-gradient(to right, #ffffff, #a1c4fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 50px rgba(0, 198, 255, 0.5);
    }

    .hero-subtitle {
      font-size: clamp(1.1rem, 2.5vw, 1.8rem);
      max-width: 800px;
      color: #d1d5db;
      font-weight: 300;
      margin-bottom: 3rem;
    }

    /* Interactive Action Buttons (Interaktīvās darbības pogas) */
    .cta-group {
      display: flex;
      gap: clamp(1rem, 2vw, 2.5rem);
    }

    .btn {
      padding: clamp(0.8rem, 1.5vw, 1.2rem) clamp(2rem, 4vw, 3.5rem);
      border-radius: 50px;
      font-weight: 700;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-primary {
      background: var(--primary-gradient);
      color: white;
      box-shadow: 0 0 20px rgba(0, 114, 255, 0.4);
      border: none;
    }

    .btn-primary:hover {
      transform: scale(1.05);
      box-shadow: 0 0 40px rgba(0, 114, 255, 0.6);
    }

    .btn-outline {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      backdrop-filter: blur(10px);
    }

    .btn-outline:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: #ffffff;
    }

    @media (max-width: 768px) {
      .hero-title { font-size: 3rem; }
      .cta-group { flex-direction: column; }
    }
  </style>
</head>
<body>

  <!-- Preloader: Active until window.load triggers to ensure high-fidelity assets are ready.
       (Ielādes ekrāns: Aktīvs līdz window.load, lai nodrošinātu resursu gatavību.) -->
  <div id="preloader"><div class="loader-circle"></div></div>
  
  <!-- Poster: Fallback image to prevent empty layout while video initializes.
       (Poster: Rezerves attēls, lai novērstu tukšu izkārtojumu video inicializācijas laikā.) -->
  <video autoplay muted loop playsinline class="video-background" poster="images/baners.webp" preload="metadata" aria-hidden="true" fetchpriority="high"> 
    <source src="images/Background.mp4" type="video/mp4">
    <track kind="captions" src="" srclang="lv" label="Latvian" default>
  </video>
  <div class="video-overlay"></div>

  <div id="header"></div>

  <main id="main-content" class="hero-container main-wrapper" role="main"> <!-- Main content container with vertical centering logic (Galvenais satura konteiners ar vertikālās centrēšanas loģiku) -->
    <div data-aos="fade-down" data-aos-duration="1000">
      <div class="hero-pretitle" data-i18n="hero.pretitle">Sveicināti nākotnē</div>
      <h1 class="hero-title">Dāvis Strazds</h1>
      <div style="font-family: 'Space Grotesk'; font-size: 1.5rem; margin-top: -1rem; margin-bottom: 1.5rem;">
        <span id="typewriter" class="typewriter-text"></span>
      </div>
    </div>
    
    <div data-aos="fade-up" data-aos-delay="200" data-aos-duration="1000">
      <p class="hero-subtitle" data-i18n="hero.subtitle">
        Es vadu <strong>AI aģentus</strong> un sistēmu arhitektūru, lai radītu risinājumus, kas pārsniedz cilvēka spēju robežas.
      </p>
    </div>

    <div class="cta-group" data-aos="zoom-in" data-aos-delay="400">
      <a href="projekti.html" class="btn btn-primary" data-i18n="hero.cta_projects">Skatīt Projektus <i class="fas fa-arrow-right"></i></a>
      <a href="par_mani.html" class="btn btn-outline" data-i18n="hero.cta_about">Par Mani</a>
    </div>
  </main>

  <div id="footer"></div>

  <script src="js/translations.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="js/main.js" defer></script>
</body>
</html>
