<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klientu Pieredze & Atsauksmes</title>
  <meta name="description" content="Mūsu sadarbības partneru un klientu veiksmes stāsti.">
  <link rel="icon" type="image/webp" href="images/logo.webp">
  <link rel="stylesheet" href="css/global_style.css">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* ==== HIGH-END DESIGN OVERRIDES (Augstākās klases dizaina pārrakstīšana) ==== */
    :root {
      --glass-bg: rgba(15, 15, 15, 0.6); /* Tumšāks fons zem teksta labākai salasāmībai */
      --glass-border: rgba(255, 255, 255, 0.2); /* Izteiktāka stikla mala */
      --text-main: #ffffff;
      --text-muted: #e2e8f0; /* Spilgtāks sekundārais teksts */
      --accent-glow: 0 0 20px rgba(64, 196, 255, 0.4);
      --gold-primary: #d4af37;
      --gold-secondary: #fcf6ba;
      --gold-glow: 0 0 25px rgba(212, 175, 55, 0.25);
      --primary-gradient: linear-gradient(135deg, #00c6ff, #0072ff);
      --gold-gradient: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
    }

    /* Automatic Dark Mode Contrast Optimization (Automātisks tumšā režīma kontrasta optimizējums) */
    @media (prefers-color-scheme: dark) {
      :root {
        --glass-bg: rgba(5, 5, 5, 0.85); /* Vēl dziļāks melnais */
        --text-muted: #ffffff; /* Maksimāls kontrasts tekstam */
      }
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: #050505;
      margin: 0;
      padding: 0;
      color: var(--text-main);
      overflow-x: hidden;
    }

    /* Video Fons - The Foundation of "Wow" */
    .video-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    .video-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.8) 100%);
      z-index: -1;
      pointer-events: none;
    }

    /* Galvenais konteiners */
    .main-wrapper {
      position: relative;
      z-index: 1;
      padding-bottom: 5rem;
    }

    .hero {
      text-align: center;
      padding: 8rem 1rem 4rem 1rem;
      position: relative;
    }

    .hero h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 4rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.5rem;
      letter-spacing: -1px;
      background: linear-gradient(to right, #fff, #b3e0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(0, 198, 255, 0.3);
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 1.2rem;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .testimonials-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 3rem;
      padding: 2rem 5%;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* GLASSMORPHISM CARD */
    .testimonial-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 2.5rem;
      backdrop-filter: blur(30px); /* Lielāks blur */
      -webkit-backdrop-filter: blur(30px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      transition: transform 0.4s ease, box-shadow 0.4s ease;
      position: relative;
      overflow: hidden;
      transform-style: preserve-3d;
      transform: perspective(1000px);
    }

    /* Glow efekts uz hover */
    .testimonial-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(600px circle at var(--mouse-x) var(--mouse-y), rgba(212, 175, 55, 0.15), transparent 40%);
      z-index: -1;
      opacity: 0;
      transition: opacity 0.4s;
    }

    .testimonial-card:hover {
        border-color: rgba(212, 175, 55, 0.5);
        box-shadow: var(--gold-glow);
        transform: translateY(-10px);
    }

    .testimonial-card:hover::before {
      opacity: 1;
    }

    .testimonial-card i.fa-quote-left {
      font-size: 2rem;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
    }

    .testimonial-text {
      margin: 1.5rem 0;
      font-size: 1.1rem;
      line-height: 1.7;
      color: #f8fafc;
      font-weight: 400; /* Labāka salasāmība */
    }

    .testimonial-author h3 {
      margin: 0.5rem 0 0 0;
      font-weight: 700;
      color: white;
      letter-spacing: 0.5px;
    }

    .testimonial-author p {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 0;
    }

    .rating i {
      color: #FFD700;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
      font-size: 0.8rem;
    }

    .contact-section {
      margin-top: 6rem;
      padding: 4rem 1rem;
      text-align: center;
      position: relative;
    }

    .contact-section h2 {
      font-size: 2.5rem;
      margin-bottom: 2rem;
      color: white;
      font-family: 'Space Grotesk', sans-serif;
    }

    .feedback-form {
      max-width: 600px;
      margin: 0 auto;
      background: rgba(10, 10, 10, 0.6);
      padding: 3rem;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }

    .feedback-form input,
    .feedback-form textarea {
      background: transparent;
      padding: 1rem;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      font-size: 1rem;
      color: white;
      font-family: 'Outfit', sans-serif;
      transition: all 0.3s;
      outline: none;
    }

    .feedback-form input:focus,
    .feedback-form textarea:focus {
      border-bottom-color: #00c6ff;
      background: rgba(255,255,255,0.02);
      box-shadow: 0 10px 20px -10px rgba(0, 198, 255, 0.2);
    }

    .feedback-form textarea {
      min-height: 120px;
      resize: vertical;
    }

    .submit-btn {
      background: var(--primary-gradient);
      color: white;
      padding: 1.2rem;
      font-weight: 700;
      font-size: 1.1rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: 0 10px 30px rgba(0, 114, 255, 0.3);
      margin-top: 1rem;
    }

    .submit-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(0, 114, 255, 0.5);
    }

    .success-message {
      display: none;
      margin-top: 1rem;
      color: #00ff88;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
    }

    /* Pielāgošana mobilajām ierīcēm */
    @media (max-width: 768px) {
      .hero h1 { font-size: 2.5rem; }
      .testimonial-card { padding: 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- Dynamic background layer (Dinamiskais fona slānis) -->
  <video autoplay muted loop playsinline class="video-background">
    <source src="images/Background.mp4" type="video/mp4">
  </video>
  <div class="video-overlay"></div>

  <!-- Header include -->
  <div id="header"></div>

  <main class="main-wrapper">
    <!-- Hero Section -->
    <section class="hero" data-aos="fade-up">
      <h1 data-i18n="testimonials.title">KLIENTU PIEREDZE</h1>
      <p class="subtitle" data-i18n="testimonials.subtitle">Tehnoloģijas, kas pārsniedz gaidīto</p>
    </section>

    <!-- Dinamiskais Testimonials Grid -->
    <section class="testimonials-grid" id="testimonials-container">
      <!-- Saturs ielādēsies automātiski -->
    </section>

    <!-- Feedback Form -->
    <section class="contact-section" data-aos="fade-up">
      <h2 data-i18n="testimonials.cta_title">SĀKSIM SADARBĪBU</h2>
      <p style="color: #bbb; margin-bottom: 2rem;" data-i18n="testimonials.cta_subtitle">Kļūsti par nākamo veiksmes stāstu</p>
      <form class="feedback-form" id="feedback-form" onsubmit="handleFeedbackSubmit(event)">
        <input type="text" name="name" placeholder="Jūsu Vārds" data-i18n="contact.placeholder_name" autocomplete="name" required>
        <input type="email" name="email" placeholder="E-pasta adrese" data-i18n="contact.placeholder_email" autocomplete="email" required>
        <textarea name="message" placeholder="Jūsu ideja vai atsauksme..." data-i18n="contact.placeholder_msg" required></textarea>
        <button type="submit" class="submit-btn" data-i18n="contact.send">NOSŪTĪT ZIŅU <i class="fas fa-paper-plane"></i></button>
        <div class="success-message" id="success-message" data-i18n="contact.success"><i class="fas fa-check-circle"></i> Ziņa veiksmīgi nosūtīta!</div>
      </form>
    </section>
  </main>

  <!-- Footer include -->
  <div id="footer"></div>

  <!-- Scripts -->
  <script src="js/translations.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="js/main.js" defer></script>
  <!-- Vanilla Tilt bibliotēka priekš 3D efekta -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>

</body>
</html>
